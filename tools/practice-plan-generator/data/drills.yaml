  - fielding_grounder
  - throwing
  - arm_action
  description: 'Coach pushes or rolls a very slow ball just a few feet in front of the fielder, or rolls it from 20+ feet
    away so it nearly stops before the fielder reaches it. Player must charge hard, time their approach, field the ball cleanly
    with momentum going toward first, and make a quick, accurate throw. Teaches the most difficult routine play in youth baseball.
    Variations: bare-hand the ball (if leather is worn), scoop with two hands, or use a do-or-die crow-hop throw.'
  coaching_cues:
  - Charge early — the ball is dying, you have to go get it
  - Field it outside your right foot, keep your momentum going forward
  - 'Quick release: you don''t have time to set your feet perfectly'
