  description: 'Split team into groups of 3-4 players in relay lines, standing 15-20 feet apart (scale to arm strength). Middle
    player starts by rolling a ground ball to one end. End player fields cleanly and throws to cutoff; cutoff relays to the
    far end; that player fires back. Groups race to complete a set number of clean relays first. Rules: only clean throws
    count (both fielder and receiver handle it cleanly). Drop the ball = that team''s count resets or doesn''t advance. First
    team to 5 clean relays wins. Variation: run it as whole-team two-line race if enough players.

    '
  coaching_cues:
  - Hands up as a target — your thrower needs to know where to throw
  - 'Quick release: catch it and fire, don''t hold it'
  - A dropped ball doesn't count — accuracy beats speed
  - 'Clean throws only: this is about doing it right, not just fast'
