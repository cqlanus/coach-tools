- id: forehand_backhand_drill
  name: Forehand & Backhand Extension
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - forehands_backhands
  - fielding_grounder
  description: 'Coach rolls balls to player''s forehand (glove side extension) and backhand (throwing-hand side extension).
    Forehand: front shoulder on target to keep throw on line. Backhand: bend at the knees, not the waist; keep eyes close
    to the glove.

    '
  coaching_cues:
  - 'Forehand: point your front shoulder at where you''re throwing'
  - 'Backhand: knees, not waist — stay tall'
  - 'Both: glove open and firm through the ball'
  duration_min: 8
