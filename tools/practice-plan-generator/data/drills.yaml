  description: 'Players simulate fielding a ground ball or fly ball, then use a crow hop (shuffle-step toward the target)
    to generate momentum before throwing. From outfield position: field ball, replace throwing-arm foot with glove-arm foot
    while hopping toward target, throw on a line. From infield: field ball, quick shuffle-step toward first, throw. Start
