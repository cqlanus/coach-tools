- id: base_to_base_team_drill
  name: Base-to-Base Team Drill
  category: throwing
  focus_tags:
  - balanced
  - throwing
  - situations
  skills:
  - throwing
  - catch_thrown_ball
  - moves_feet_to_ball
  - covering_first
  - team_concept
  description: 'Place players at each base (2 per base if enough). Throw around the horn: home → 3rd → 2nd → 1st → home. Each
    player must move their feet to receive and throw. Reverse direction after several rounds. Not position-specific — any
    player can be at any base.

    '
  coaching_cues:
  - Move your feet to get in line before the ball gets there
  - Don't throw until you've got your feet set
  - 'Fielder at the bag: give a target with your glove'
  duration_min: 8
  duration_max: 12
  players_min: 8
  players_max: null
  coaches_needed: 1
