  description: Player holds their glove completely flat (palm up, fingers forward) rather than in the normal catching position.
    Partner rolls or tosses ground balls. Player fields using only the flat glove — forces the fielder to get low, get in
    front, and use soft hands to receive the ball rather than stabbing at it. Teaches the correct "scoop" technique for fielding
    grounders out in front. 10-15 reps, then switch to normal glove position.
  coaching_cues:
  - Glove completely flat — like a serving tray
  - Get your body in front so the ball comes to you
  - 'Soft hands: let the ball run into the glove, don''t attack it'
