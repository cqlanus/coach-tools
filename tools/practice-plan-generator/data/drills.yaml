- id: first_base_footwork
  name: First Base Footwork Drill
  category: fielding
  focus_tags:
  - balanced
  - fielding
  - situations
  skills:
  - first_base_footwork
  - first_base_short_hops
  - catch_thrown_ball
  description: 'First baseman stands on the bag. Coach throws from different infield angles — simulating throws from SS, 2B,
    3B, and pitcher. 1B adjusts foot placement based on throw direction (left foot for throws from right side, right foot
    for left-side throws). Mix in short hops. 1B must find the bag without looking down.

    '
  coaching_cues:
  - Find the bag with your foot — don't look down
  - Stretch toward the throw, not straight out
  - 'Left throw: right foot on bag; right throw: left foot on bag'
  duration_min: 8
  duration_max: 12
  players_min: 3
  players_max: 6
