- id: fly_ball_drop_step
  name: Fly Ball Drop Step
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - catch_fly_ball
  - moves_feet_to_ball_fly
  - outfield_fly_ball_footwork
  description: 'Players in single file. Each player faces coach 5 feet away. Coach points left or right. Player executes drop
    step + crossover in that direction, then coach throws a fly ball 3 steps in that direction. Repeat to both sides. Looking
    for drop step (not backpedal) and proper glove position at catch.

    '
  coaching_cues:
  - 'Drop step: one foot goes back first, then crossover — never backpedal'
  - Get to the spot early — wait for the ball, don't drift into it
  - Glove up, fingers to the sky at catch
  duration_min: 8
  duration_max: 15
  players_min: 4
  players_max: null
  coaches_needed: 1
  group_type: small_group
