- id: stretching_routine
  name: Stretching Routine
  category: warmup
  focus_tags:
  - balanced
  - throwing
  - hitting
  - fielding
  - pitching
  skills: []
  description: 'Standing stretches: arm circles (forward/backward), arm across chest, arm behind head, forearm stretches,
    oblique stretches, trunk twists, hamstring stretches, groin stretches, hip flexor lunges. 30-45 seconds per stretch.

    '
  coaching_cues:
  - Hold each stretch — don't bounce
  - Trunk twists loosen the hips for hitting and throwing
