  - throwing
  skills:
  - fielding_grounder
  - two_hands_out_front
  - throwing
  - arm_action
  description: Player holds their glove in their glove hand but keeps it folded closed or tucked behind their back. Player
    self-tosses a baseball in front of them, lets it bounce once, then fields it bare-handed with their glove hand — and immediately
    transfers it to the throwing hand for a simulated throw. Forces soft hands, proper receive-and-transfer mechanics, and
    gets rid of the crutch of a big glove pocket. 10-15 reps.
  coaching_cues:
  - 'Soft hands: catch it, don''t stab it'
  - 'Transfer immediately: receive it and get it to your throwing hand in one motion'
  - 'Two-hand habit: bring your throwing hand to meet the glove hand'
