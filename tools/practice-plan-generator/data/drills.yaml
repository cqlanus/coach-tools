- id: tee_work
  name: Tee Work
  category: hitting
  focus_tags:
  - balanced
  - hitting
  skills:
  - swinging_mechanics
  - hitting_skills
  - balance
  - load
  - hand_arm_action
  - hip_action
  - swinging_hard
  - contact_ability
  description: 'Tee placed at front edge of plate. Batter''s front foot starts behind the tee. Use wiffle balls (gym/overtime)
    or baseballs (field). Run through positions: middle, high (hands on top), low (let ball travel deeper), outside (drive
    to opposite field). 8-10 swings per position per player.

    '
  coaching_cues:
  - Front foot behind the tee — you'll pull off otherwise
  - 'High tee: keep hands on top, hit a line drive not a pop-up'
  - 'Low tee: let it travel deep, don''t drop your back shoulder'
  - 'Outside tee: stay through the ball, drive it the other way'
  duration_min: 10
  duration_max: 20
  players_min: 2
  players_max: 4
  coaches_needed: 1
