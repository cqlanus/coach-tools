- id: fly_ball_progression
  name: Fly Ball Progression
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - catch_fly_ball
  - glove_windshield_wiper_fly
  - thumb_to_thumb_fly
  - catch_at_chin_level
  - moves_feet_to_ball_fly
  description: 'Coach underhands balls to players standing in a circle or line. Start at chest height, progress upward. Begin
    right at the player, then force movement left and right. Key mechanics: thumb-to-thumb, glove fingers up, catch at chin/head
    level, two-hand finish. Then progress to higher, further tosses.

    '
  coaching_cues:
  - 'Glove up: fingers point to the sky, not at the ball'
  - 'Thumb to thumb: catching hand behind the glove'
  - Catch at your chin — not your chest, not above your head
  - Move your feet first, then put your glove up
  duration_min: 8
  duration_max: 15
  players_min: 4
  players_max: null
  coaches_needed: 1
