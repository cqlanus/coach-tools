- id: four_seam_grip_intro
  name: 4-Seam Grip Introduction
  category: throwing
  focus_tags:
  - balanced
  - throwing
  - pitching
  skills:
  - throwing
  - arm_action
  description: 'Coach demonstrates 4-seam grip. Players find the seams on their own ball — index and middle fingers across
    the horseshoe seam, thumb underneath. For smaller hands: 3 fingers across. Players hold grip for coach to check.

    '
  coaching_cues:
  - Find the horseshoe, fingers across the seam
  - Thumb directly underneath
  - Loose grip — not a death grip
  duration_min: 3
  duration_max: 5
  players_min: 2
  players_max: null
  coaches_needed: 1
  group_type: whole_team
  locations:
