- id: coach_grounders_infield
  name: Coach Grounders — Infield
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - fielding_grounder
  - two_hands_out_front
  - moves_feet_to_ball
  - throwing
  - catch_thrown_ball
  description: 'Coach rolls/hits ground balls to a line of infielders. Start directly at players, progress to left and right.
    Players field, set feet, and throw to a target (coach, player at base, or bucket). Use cones to mark left/right target
    zones. Rotate through players.

    '
  coaching_cues:
  - Read the ball early — get moving before it reaches you
  - Charge slow rollers, don't wait for them
  - Field then throw — don't try to do both at once
  duration_min: 10
  duration_max: 20
  players_min: 4
  players_max: null
