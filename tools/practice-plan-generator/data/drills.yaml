- id: fielding_one_foot_timing
  name: 'Fielding: One-Foot Timing Drill'
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - fielding_grounder
  - moves_feet_to_ball
  - two_hands_out_front
  description: 'Player balances on their right foot only (throwing-arm side). Partner rolls or tosses a ground ball. As the
    ball arrives, player steps with their LEFT foot to receive — timing the step so the left foot hits the ground exactly
    as the ball enters the glove. Trains the fundamental footwork timing of fielding: left foot down = glove down. Right-handed
    fielders step left into the catch; this drill isolates and reinforces that habit.'
  coaching_cues:
  - 'Left foot down = glove down: they happen at the same time'
  - Don't reach early — wait for your foot to land
  - Stay balanced on the right foot until you're ready to step
