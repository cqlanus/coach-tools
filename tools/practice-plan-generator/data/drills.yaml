- id: fielding_dp_flips
  name: Double Play Flips and Tosses
  category: fielding
  focus_tags:
  - balanced
  - fielding
  - situations
  skills:
  - fielding_grounder
  - throwing
  - mi_covering_second
  - forehands_backhands
  description: 'Middle infield pairs (SS and 2B, or any two players) practice the three short tosses used near second base:
    1) Underhand flip: fielder near the bag, soft underhand toss to partner at second. 2) Backhand flip: fielder moving away
    from bag, backhands the ball and flips it. 3) Quarter-turn toss: fielder turns 90 degrees, tosses chest-high to partner.
    Partners stand 6-10 feet apart. Do 8-10 reps of each toss type. Focus: accuracy and soft, catchable tosses — not velocity.'
  coaching_cues:
  - 'Underhand: palm up, lead with the wrist, soft toss to the chest'
  - 'Backhand: glove faces the target at release — don''t flip it blindly'
  - 'All tosses: catchable and chest-high — you''re helping your partner, not throwing them out'
