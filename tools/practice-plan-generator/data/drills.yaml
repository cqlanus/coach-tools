- id: outfield_communication
  name: Outfield Communication Drill
  category: fielding
  focus_tags:
  - balanced
  - fielding
  - situations
  skills:
  - calling_for_ball
  - catch_fly_ball
  - outfield_throw_to_cutoff
  - pop_ups_infield_outfield
  - calling_each_other_off
  description: 'Split outfielders into two groups (designate CF role). Coach at 2nd base with fungo. Hit fly balls and grounders
    between groups. Outfielders must call loudly ("I got it! I got it!"). CF has priority. Non-catcher backs up. Fielder who
    gets it throws to a cutoff.

    '
  coaching_cues:
  - Call it EARLY and LOUD — not after it lands near you
  - If you hear a call, get out of the way and back them up
  - CF always has priority over corner outfielders
  duration_min: 10
  duration_max: 15
  players_min: 6
  players_max: null
