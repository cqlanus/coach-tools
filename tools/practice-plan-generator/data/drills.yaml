- id: grounders_on_knees
  name: Ground Balls on Knees
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - fielding_grounder
  - two_hands_out_front
  description: 'Players pair up. Both on their knees, 10-15 feet apart. Roll ground balls back and forth. Focus on fielding
    out in front, two hands, glove open. Good drill to isolate hand and glove work before adding footwork.

    '
  coaching_cues:
  - Field out in FRONT — not between your legs
  - 'Alligator: throwing hand on top of glove after ball enters'
  - Keep your eyes on the ball all the way into the glove
  duration_min: 5
  duration_max: 8
  players_min: 4
  players_max: null
  coaches_needed: 1
