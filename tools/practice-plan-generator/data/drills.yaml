- id: grounders_standing
  name: Ground Balls Standing — Partner Rolls
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - fielding_grounder
  - two_hands_out_front
  - moves_feet_to_ball
  description: 'Players pair up, 15-20 feet apart. Roll ground balls to partner — first directly at them, then to their left
    and right, forcing foot movement. Progress to throwing rather than rolling as players improve.

    '
  coaching_cues:
  - 'Athletic position: knees bent, glove near the ground'
  - Move your feet to get in front — don't reach sideways
  - Feet + glove make a triangle
  duration_min: 5
  duration_max: 10
  players_min: 4
  players_max: null
  coaches_needed: 1
  group_type: pairs
  locations:
