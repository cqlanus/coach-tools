  description: "Full team on defense. Coach hits or rolls a ground ball to a specific infield position. Every other player\
    \ moves to their correct position simultaneously — no standing and watching. Run through all 5 hit locations. Ball to\
    \ 3B: 3B fields and throws to 1B; SS backs up 3B; 2B covers 2nd;\n  1B covers first; P backs up 3rd; C backs up 1st; LF\
    \ moves toward 3rd;\n  RF backs up 1st; CF backs up 2nd.\nBall to SS: SS fields and throws to 1B; 3B covers 3rd; 2B covers\
    \ 2nd;\n  1B covers first; P covers/backs up; C backs up 1st; LF moves toward\n  short; CF drifts toward the play.\nBall\
    \ to 2B: 2B fields and throws to 1B; SS covers 2nd; 3B covers 3rd;\n  1B covers first; P backs up; C backs up 1st; RF\
    \ moves toward second;\n  CF backs up.\nBall to 1B: 1B fields and throws to P covering 1st (or self if close);\n  2B covers\
    \ 2nd; SS covers 3rd; C backs up 1st; P sprints to cover\n  first base bag; LF backs up third.\nBall to P: P fields and\
    \ throws to 1B; 1B covers first; SS covers 2nd;\n  2B covers 2nd or backs up; C backs up 1st; CF backs up through the\
    \ middle.\nWalk through slowly first, then run at game speed.\n"
