  description: 'Coach rolls a slow or medium grounder from 20-30 feet away. Player charges hard from their starting position,
    fields the ball on the run, and fires into a net or fence. Emphasis: attack the ball, don''t wait for it. Field it moving
    forward, keep momentum toward target. Progresses: start from further away, vary the pace of the grounder (slow roller
    vs. medium pace), add a throw to a base or target instead of net.'
  coaching_cues:
  - Attack the ball — sprint toward it, don't let it come to you
  - Field it while you're moving forward, not after you stop
  - 'Short-hop routine: read the last bounce and adjust'
