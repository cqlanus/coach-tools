  description: '1-3 outfielders, 2 middle infielders (or more), and 2 runners at home. Coach hits to the outfield. Runner
    at home reads the ball and tries to stretch it into a double — always runs aggressively, then reads the play and follows
    the coach''s signal. Outfield: field cleanly and throw to second base (direct or through cutoff). Infield: cutoff positions,
    cover second. Scoring/competition: time how long from ball contact to when it reaches second base. Track times and compare
    across reps — outfield aims to beat their own best time. If runner beats the throw: runner wins. If throw beats runner:
    defense wins. Keep a running tally.

