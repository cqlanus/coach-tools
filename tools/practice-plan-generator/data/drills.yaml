- id: one_knee_throwing
  name: One-Knee Throwing Progression
  category: throwing
  focus_tags:
  - balanced
  - throwing
  - pitching
  skills:
  - throwing
  - arm_action
  - pitching_mechanics
  - pitching_arm_action
  description: 'Partners face each other on one knee (glove-side knee up). 3-count drill: 1) Ball in glove at chest, 2) Four-seam
    grip, elbow high, glove points at target, 3) Throw, pull glove to chest, follow through over glove-side knee. Remove the
    count once mechanics click.

    '
  coaching_cues:
  - Elbow above the shoulder — always
  - Pull the glove to your chest as you throw
  - 'Follow through: throwing elbow finishes over your glove-side knee'
  duration_min: 5
  duration_max: 8
  players_min: 4
  players_max: null
  coaches_needed: 1
