- id: wrist_flips
  name: Wrist Flips
  category: throwing
  focus_tags:
  - balanced
  - throwing
  - pitching
  skills:
  - throwing
  - arm_action
  - arm_strength
  description: 'Partners 7-10 feet apart. Throwing elbow at shoulder height, glove hand supports elbow from below. Flip ball
    to partner using only wrist rotation and follow-through. Goal: 5 perfect flips. Emphasize spin and follow-through.

    '
  coaching_cues:
  - Elbow stays up at shoulder height
  - Snap the wrist — show the back of your hand at finish
  - Ball should have good spin, not wobble
  duration_min: 5
  duration_max: 8
  players_min: 4
  players_max: null
  coaches_needed: 1
  group_type: pairs
  locations:
  - field
  - overtime
