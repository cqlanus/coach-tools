- id: dry_swings
  name: Dry Swings — No Bat / With Bat
  category: hitting
  focus_tags:
  - balanced
  - hitting
  skills:
  - swinging_mechanics
  - balance
  - load
  - hand_arm_action
  - hip_action
  description: 'Start without a bat — arms crossed over chest, focus on hip rotation. Progress to bat. Slow-motion swings
    first, then full speed. Hip drill: arms folded, initiate swing with hips only, hands follow. Coach walks through setup:
    athletic stance, bat up, knob to catcher, load back before swing.

    '
  coaching_cues:
  - Knob to the pitcher as you start your swing — not the barrel
  - Hips lead, hands follow — your belly button points to the pitcher at finish
  - 'Stay balanced: weight back at load, finish on your front side'
  duration_min: 5
  duration_max: 10
  players_min: 2
  players_max: null
  coaches_needed: 1
