drills:
- id: dynamic_warmup_bases
  name: Dynamic Warmup — Base Path Circuit
  category: warmup
  focus_tags:
  - balanced
  - baserunning
  skills:
  - base_running
  description: 'Players jog a lap then run the base path with a different movement each leg: high knees to 1st, butt kicks
    to 2nd, shuffle to 3rd, run backwards to home, then a full sprint all the way around.

    '
  coaching_cues:
  - High knees means knees above the waist
  - Shuffle — stay low, don't cross your feet
  - Backwards run — small steps, look over your shoulder
  duration_min: 5
  duration_max: 8
  players_min: 4
  players_max: null
  coaches_needed: 1
  group_type: whole_team
  locations:
  - field
  - overtime
  - gym
  equipment:
  - bases
  level: basic
  position_specific: null
  station_role: opening
  station_safe: true
  group_size_ideal: null
  self_directed: true
- id: dynamic_warmup_agility
  name: Dynamic Warmup — Agility Run
  category: warmup
  focus_tags:
  - balanced
  - fielding
  - throwing
  skills: []
  description: 'Jog, then run through a sequence of movements over 20-30 yards: high knees, power skips, carioca (grapevine),
    shuffle, backwards run. Can use cones to mark distances.

    '
  coaching_cues:
  - 'Carioca: hips rotate, not just legs'
  - Stay on the balls of your feet the whole time
  duration_min: 5
  duration_max: 8
  players_min: 4
