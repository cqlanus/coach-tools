- id: quick_toss
  name: Quick Toss
  category: throwing
  focus_tags:
  - balanced
  - throwing
  - fielding
  skills:
  - catch_thrown_ball
  - throwing
  - moves_feet_to_ball
  - arm_action
  description: 'Partners stand 20-30 feet apart. The goal is to receive the ball with two hands and release it back as quickly
    as possible — emphasizing hand quickness and footwork, NOT arm strength. Catching focus: move feet to get around the ball
    as it arrives; catch with two hands, transfer cleanly. Throwing focus: quick release from wherever your feet are — no
    winding up. Competition variation: count how many clean exchanges in 30 seconds. Remind players: you''re not throwing
    hard, you''re throwing fast and clean.'
  coaching_cues:
  - 'Feet first: move around the ball, don''t just reach for it'
  - 'Two hands to receive: glove catches it, throwing hand covers it instantly'
  - 'Quick release: catch it and it''s gone — no holding'
  - 'Fast, not hard: these are short crisp tosses, not throws'
  duration_min: 5
