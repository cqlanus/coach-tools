  self_directed: true
- id: step_and_throw
  name: Step and Throw (Catch-Step-Throw)
  category: throwing
  focus_tags:
  - balanced
  - throwing
  - fielding
  skills:
  - throwing
  - arm_action
  - arm_strength
  - catch_thrown_ball
  - moves_feet_to_ball
  description: 'Two lines facing each other, 25-35 feet apart. Throwing side steps toward target (glove side foot forward),
    loads arm (thumb to thigh, knuckles to sky, elbow up), then throws. Receiving side gets in line with the ball, catches
    two-handed, then becomes the thrower. Progressively increase distance.

    '
  coaching_cues:
  - Step toward your target — point your front shoulder at them
  - Elbow up — make an 'L' with your arm
  - Follow through across your body
  - 'Receiver: get your feet to the ball, don''t reach'
  duration_min: 8
  duration_max: 15
  players_min: 6
  players_max: null
  coaches_needed: 1
  group_type: pairs
  locations:
  - field
  - overtime
  - gym
  equipment:
  - baseballs
  level: basic
  position_specific: null
  station_role: opening
  station_safe: true
  group_size_ideal: null
  self_directed: true
- id: relay_drill
  name: Relay Drill
  category: throwing
  focus_tags:
  - balanced
  - throwing
  - situations
  skills:
  - throwing
  - arm_action
  - catch_thrown_ball
  - throwing_relays
  - mi_cutoff
  description: 'Line up 3-5 players about 10-15 feet apart. Ball is thrown down the line, each player catches, pivots, and
    fires to the next. Run it both directions. Progress to longer distances as arm strength allows.

    '
  coaching_cues:
  - Hands up as a target — give the thrower something to aim at
  - Catch it, pivot, don't hold it
  - Stay in line so your throw doesn't have to travel sideways
  duration_min: 5
  duration_max: 10
  players_min: 6
  players_max: null
  coaches_needed: 1
