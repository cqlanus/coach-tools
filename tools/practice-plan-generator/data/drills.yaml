- id: outfield_grounder_approach
  name: Outfield Ground Ball Approach
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - outfield_grounders
  - fielding_grounder
  - outfield_throw_to_cutoff
  description: 'Outfielders line up. Coach places 3 balls out in front of each player at 15, 25, and 35 feet. Player sprints
    to each ball, breaks down to field, simulates throw to cutoff after the third. Emphasis: get low and through the ball,
    not passive. After proficient: coach rolls live grounders.

    '
  coaching_cues:
  - Sprint to the ball, then break down — don't slow-jog the whole way
  - Get your body in front — limit extra bases if you bobble it
  - 'After fielding: find your cutoff man immediately'
  duration_min: 8
  duration_max: 12
