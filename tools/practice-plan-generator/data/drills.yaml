- id: infield_shuffle_drill
  name: Infield Shuffle Drill
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - fielding_grounder
  - two_hands_out_front
  - moves_feet_to_ball
  description: 'Set 4 cones in a line between 2nd and 3rd base area. Players start opposite one another. Roll balls while
    players shuffle laterally to field each one. Key: stay low, glove out front and on the ground throughout the shuffle.

    '
  coaching_cues:
  - Stay low — don't pop up while you're moving
  - Glove stays out front the whole time
  - 'Shuffle: don''t cross your feet'
  duration_min: 8
  duration_max: 12
  players_min: 4
  players_max: 8
  coaches_needed: 1
  group_type: small_group
