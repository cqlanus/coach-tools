  coaching_cues:
  - 'Runner: always run hard — read the play, don''t assume you''re stopping'
  - 'Outfield: field it clean first, then get rid of it fast'
  - 'Throw to second: direct if you''re close, cutoff if you''re deep'
  - 'Cutoff: get in line early, be ready — the throw is coming fast'
