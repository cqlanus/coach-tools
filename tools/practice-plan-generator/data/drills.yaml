- id: short_hop_drill
  name: Short Hop Drill
  category: fielding
  focus_tags:
  - balanced
  - fielding
  skills:
  - fielding_grounder
  - two_hands_out_front
  - first_base_short_hops
  description: 'Coach or partner throws short hops to front, backhand side, and glove side. Can be done standing or on both
    knees (easier regression). Players catch each short hop cleanly. Great for first basemen but useful for all.

    '
  coaching_cues:
  - Watch the ball, not the hop — track it all the way
  - Soft hands — give a little at contact
  - 'Backhand: bend your knee, not your back'
  duration_min: 5
  duration_max: 10
  players_min: 4
