  self_directed: true
- id: torso_twist_throws
  name: Torso Twist Throws
  category: throwing
  focus_tags:
  - balanced
  - throwing
  skills:
  - throwing
  - arm_action
  description: 'Partners 10-15 feet apart. Feet stay planted parallel, no stepping. Throw using only upper body rotation —
    torso, shoulder, and arm. Emphasis on equal-and-opposite: glove side points at target as throwing arm goes back.

    '
  coaching_cues:
  - Feet stay still — this is all upper body
  - Glove points at your partner as your throwing arm goes back
  - Equal and opposite — see the 'W' shape at power position
  duration_min: 5
  duration_max: 8
  players_min: 4
  players_max: null
  coaches_needed: 1
